name: Build Executables

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Client Executable
      run: pyinstaller --onefile --name porta-client --collect-all textual --collect-all rich --collect-all pyfiglet --collect-all websockets client/client.py

    - name: Build Server Executable
      run: pyinstaller --onefile --name porta-server --collect-all websockets --collect-all pyngrok server/server.py

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: porta-client-${{ runner.os }}
        path: dist/porta-client*

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: porta-server-${{ runner.os }}
        path: dist/porta-server*